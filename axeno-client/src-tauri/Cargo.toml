[package]
name = "axeno-client"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

[lib]
name = "axeno_client_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
# This was missing in the last turn!
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Signal uses rand 0.8 and rand_core 0.6. 
# We pin these to ensure trait compatibility for OsRng.
rand = "0.8.5"
rand_core = "0.6.4"
libsignal-protocol = { git = "https://github.com/signalapp/libsignal", package = "libsignal-protocol" }

argon2 = "0.5"
chacha20poly1305 = "0.10"
zeroize = { version = "1", features = ["derive"] }
hex = "0.4"
thiserror = "1"

[patch.crates-io]
# Required for Signal's specific elliptic curve math
curve25519-dalek = { git = "https://github.com/signalapp/curve25519-dalek", tag = "signal-curve25519-4.1.3" }
